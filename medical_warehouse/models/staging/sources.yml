version: 2

sources:
  - name: raw
    schema: raw
    tables:
      - name: telegram_messages
        description: "Raw messages scraped from Telegram channels"
        columns:
          - name: message_id
            description: "Unique message identifier"
          - name: channel_name
            description: "Name of the Telegram channel"
          - name: message_date
            description: "Timestamp of the message"
          - name: message_text
            description: "Full text content of the message"
          - name: has_media
            description: "Whether message contains media"
          - name: image_path
            description: "Local path to downloaded image"
          - name: views
            description: "Number of views"
          - name: forwards
            description: "Number of forwards"

      - name: yolo_detections
        description: "YOLOv8 object detection results for downloaded images"
        columns:
          - name: message_id
            description: "Message ID matching telegram_messages"
          - name: channel_name
            description: "Channel the image came from"
          - name: image_category
            description: "Classified category: promotional, product_display, lifestyle, other"
          - name: detected_objects
            description: "Detected objects with confidence scores"
          - name: object_count
            description: "Number of objects detected"